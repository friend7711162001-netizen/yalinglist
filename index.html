<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯店管理系統</title>
    
    <!-- 網頁分頁上的可愛小 Icon (Favicon) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22metal%22 x1=%220%%22 y1=%220%%22 x2=%22100%%22 y2=%22100%%22><stop offset=%220%%22 stop-color=%22%23ffffff%22/><stop offset=%2250%%22 stop-color=%22%23e2e8f0%22/><stop offset=%22100%%22 stop-color=%22%23cbd5e1%22/></linearGradient><radialGradient id=%22shadow%22 cx=%2250%%22 cy=%2250%%22 r=%2250%%22><stop offset=%220%%22 stop-color=%22rgba(0,0,0,0.15)%22/><stop offset=%22100%%22 stop-color=%22rgba(0,0,0,0)%22/></radialGradient></defs><circle cx=%2250%22 cy=%2250%22 r=%2246%22 fill=%22%23FFE2D1%22 /><circle cx=%2250%22 cy=%2250%22 r=%2242%22 fill=%22none%22 stroke=%22%23FFB088%22 stroke-width=%222%22 stroke-dasharray=%224 4%22 /><ellipse cx=%2250%22 cy=%2278%22 rx=%2225%22 ry=%225%22 fill=%22url(%23shadow)%22 /><rect x=%2222%22 y=%2270%22 width=%2256%22 height=%226%22 rx=%223%22 fill=%22%2364748B%22 /><rect x=%2224%22 y=%2270%22 width=%2252%22 height=%222%22 fill=%22%2394A3B8%22 /><path d=%22M 28 70 A 22 22 0 0 1 72 70 Z%22 fill=%22url(%23metal)%22 /><path d=%22M 32 60 Q 37 50 48 49%22 fill=%22none%22 stroke=%22%23ffffff%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 opacity=%220.8%22 /><rect x=%2247.5%22 y=%2238%22 width=%225%22 height=%2210%22 fill=%22%2394A3B8%22 /><circle cx=%2250%22 cy=%2235%22 r=%225%22 fill=%22%23FF5C5C%22 /><circle cx=%2248.5%22 cy=%2233.5%22 r=%221.5%22 fill=%22%23ffffff%22 opacity=%220.8%22 /><circle cx=%2240%22 cy=%2258%22 r=%223%22 fill=%22%23475569%22 /><circle cx=%2260%22 cy=%2258%22 r=%223%22 fill=%22%23475569%22 /><ellipse cx=%2232%22 cy=%2261%22 rx=%224%22 ry=%222.5%22 fill=%22%23FF8BA7%22 opacity=%220.7%22 /><ellipse cx=%2268%22 cy=%2261%22 rx=%224%22 ry=%222.5%22 fill=%22%23FF8BA7%22 opacity=%220.7%22 /><path d=%22M 46 61 Q 50 65 54 61%22 fill=%22none%22 stroke=%22%23475569%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 /><path d=%22M 22 35 Q 26 35 26 31 Q 26 35 30 35 Q 26 35 26 39 Q 26 35 22 35 Z%22 fill=%22%23FFA500%22 /><path d=%22M 72 45 Q 75 45 75 42 Q 75 45 78 45 Q 75 45 75 48 Q 75 45 72 45 Z%22 fill=%22%23FFA500%22 /></svg>">
    
    <link rel="stylesheet" href="list.css">
    <!-- 引入 Google Fonts 添加現代活潑的圓潤字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 登入畫面 -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h2>🔐 系統登入</h2>
            <p>請輸入帳號密碼以取得導覽權限</p>
            <div class="input-group">
                <input type="text" id="username" placeholder="帳號">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="密碼">
            </div>
            <p id="login-error" class="error-msg" style="display: none;">帳號或密碼錯誤！</p>
            <button id="login-btn" class="login-btn">登入</button>
        </div>
    </div>

    <!-- 原本的主容器，預設先隱藏 -->
    <div class="app-container" id="app-container" style="display: none;">
        <!-- 左側導覽列 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 style="display: flex; align-items: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36" height="36" style="margin-right: 8px; flex-shrink: 0;">
                      <defs>
                        <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
                          <stop offset="0%" stop-color="#ffffff"/>
                          <stop offset="50%" stop-color="#e2e8f0"/>
                          <stop offset="100%" stop-color="#cbd5e1"/>
                        </linearGradient>
                        <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
                          <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
                          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
                        </radialGradient>
                      </defs>
                      <circle cx="50" cy="50" r="46" fill="#FFE2D1" />
                      <circle cx="50" cy="50" r="42" fill="none" stroke="#FFB088" stroke-width="2" stroke-dasharray="4 4" />
                      <ellipse cx="50" cy="78" rx="25" ry="5" fill="url(#shadow)" />
                      <rect x="22" y="70" width="56" height="6" rx="3" fill="#64748B" />
                      <rect x="24" y="70" width="52" height="2" fill="#94A3B8" />
                      <path d="M 28 70 A 22 22 0 0 1 72 70 Z" fill="url(#metal)" />
                      <path d="M 32 60 Q 37 50 48 49" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
                      <rect x="47.5" y="38" width="5" height="10" fill="#94A3B8" />
                      <circle cx="50" cy="35" r="5" fill="#FF5C5C" />
                      <circle cx="48.5" cy="33.5" r="1.5" fill="#ffffff" opacity="0.8" />
                      <circle cx="40" cy="58" r="3" fill="#475569" /> 
                      <circle cx="60" cy="58" r="3" fill="#475569" /> 
                      <ellipse cx="32" cy="61" rx="4" ry="2.5" fill="#FF8BA7" opacity="0.7" /> 
                      <ellipse cx="68" cy="61" rx="4" ry="2.5" fill="#FF8BA7" opacity="0.7" /> 
                      <path d="M 46 61 Q 50 65 54 61" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />
                      <path d="M 22 35 Q 26 35 26 31 Q 26 35 30 35 Q 26 35 26 39 Q 26 35 22 35 Z" fill="#FFA500" />
                      <path d="M 72 45 Q 75 45 75 42 Q 75 45 78 45 Q 75 45 75 48 Q 75 45 72 45 Z" fill="#FFA500" />
                    </svg>
                    櫃檯資訊系統
                </h2>
                <button id="pin-sidebar" class="toggle-btn" title="鎖定選單">🔓</button>
            </div>

            <!-- 選單清單的容器，將由 JavaScript 動態產生 -->
            <nav class="folder-tree" id="folder-tree">
                <!-- 預留結構，後續交給 JS 生成內容 -->
            </nav>
            
            <div class="sidebar-footer">
                <p>版本 v2.1</p>
                <p>更新: 2026/04/08</p>
            </div>
        </aside>

        <!-- 右側主要內容區 -->
        <main class="main-content">
            <!-- 展開側邊欄的懸浮按鈕 (一開始是隱藏的) -->
            <button id="show-sidebar" class="float-btn" title="展開選單" style="display: none;">☰</button>
            <div id="hover-trigger" class="hover-trigger" style="display: none;"></div>

            <!-- 分頁標籤列 (一開始隱藏) -->
            <div id="tabs-header-wrapper" class="tabs-header-wrapper" style="display: none;">
                <div id="tabs-container" class="tabs-container"></div>
                <div class="tabs-actions">
                    <button id="refresh-all-tabs" class="refresh-all-btn" title="重新整理所有分頁">🔄 全部重整</button>
                    <button id="close-all-tabs" class="close-all-btn" title="關閉所有未鎖定的分頁">🧹 一鍵關閉</button>
                </div>
            </div>

            <!-- 實際渲染 Google Sheet 或歡迎畫面的區域 -->
            <div id="iframe-container" class="iframe-container">
                <!-- 未選取檔案時的歡迎畫面 -->
                <div class="welcome-screen" id="welcome-screen">
                    <h3>👋 歡迎使用！</h3>
                    <p>請從左側選單點開資料夾，選擇你想查看的表單。</p>
                    <p>如有需要新增或修改，請聯繫人資部。</p>
                </div>
                <!-- 到時候 Javascript 會把許多 <iframe class="sheet-frame"> 塞進這裡 -->
            </div>
        </main>
    </div>

    <script src="list.js"></script>
</body>

</html>
